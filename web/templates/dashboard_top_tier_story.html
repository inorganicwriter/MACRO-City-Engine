  <script src="{{ url_for('static', filename='dashboard_filters.js') }}"></script>
  <script>
    let currentBundle = {};
    const charts = { gate: null, evidence: null, frontier: null, riskMix: null };

    function num(v, fallback = NaN) {
      const x = Number(v);
      return Number.isFinite(x) ? x : fallback;
    }

    function fmt(v, d = 3) {
      const x = num(v);
      return Number.isFinite(x) ? x.toFixed(d) : 'N/A';
    }

    function labelize(s) {
      return String(s || '--').replaceAll('_', ' ');
    }

    function destroy(name) {
      if (charts[name]) {
        charts[name].destroy();
        charts[name] = null;
      }
    }

    function setText(id, value, cls = '') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value;
      el.className = cls;
    }

    function coverage95(nowcast) {
      if (!nowcast || typeof nowcast !== 'object') return NaN;
      const cov = num(nowcast.global_backtest_coverage95, NaN);
      if (Number.isFinite(cov)) return cov;
      return num(nowcast.global_backtest_coverage_95, NaN);
    }

    function toggleAdvanced() {
      document.body.classList.toggle('show-advanced');
      const btn = document.getElementById('toggle-advanced-btn');
      if (!btn) return;
      btn.textContent = document.body.classList.contains('show-advanced') ? 'йҡҗи—Ҹй«ҳзә§жЁЎеқ—' : 'жҳҫзӨәй«ҳзә§жЁЎеқ—';
    }

    function drawGate(rows) {
      const data = (rows || []).slice();
      const labels = data.map((r) => labelize(r.gate));
      const vals = data.map((r) => 100 * Math.abs(num(r.gap_ratio, 0)));
      const pass = data.map((r) => num(r.passed, 0));
      const ctx = document.getElementById('gate-chart');
      if (!ctx) return;
      destroy('gate');
      charts.gate = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Gap Ratio |%|',
            data: vals,
            borderRadius: 6,
            backgroundColor: pass.map((p) => p === 1 ? '#2dd4bfbb' : '#f87185cc'),
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { beginAtZero: true, grid: { color: 'rgba(148,163,184,0.1)' } },
            y: { grid: { display: false } },
          },
          plugins: { legend: { display: false } },
        },
      });
    }

    function drawEvidence(rows) {
      const ranked = (rows || []).slice().sort((a, b) => num(b.score_0_100, 0) - num(a.score_0_100, 0)).slice(0, 8);
      const labels = ranked.map((r) => labelize(r.evidence_track));
      const vals = ranked.map((r) => num(r.score_0_100, 0));
      const ctx = document.getElementById('evidence-chart');
      if (!ctx) return;
      destroy('evidence');
      charts.evidence = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Evidence Score',
            data: vals,
            borderRadius: 6,
            backgroundColor: vals.map((v) => v >= 85 ? '#2dd4bfcc' : (v >= 70 ? '#b45309cc' : '#f87185cc')),
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { min: 0, max: 100, grid: { color: 'rgba(148,163,184,0.1)' } },
            x: { ticks: { maxRotation: 75, minRotation: 35 }, grid: { display: false } },
          },
        },
      });
    }

    function drawFrontier(rows) {
      const all = (rows || []).slice();
      const pareto = all.filter((r) => num(r.is_pareto_efficient, 0) === 1).map((r) => ({
        x: num(r.eval_roc_auc, NaN),
        y: 1 - num(r.eval_brier, NaN),
        r: 4 + 90 * Math.abs(num(r.temporal_mean_gain_vs_base, 0)),
      }));
      const nonPareto = all.filter((r) => num(r.is_pareto_efficient, 0) !== 1).map((r) => ({
        x: num(r.eval_roc_auc, NaN),
        y: 1 - num(r.eval_brier, NaN),
        r: 4 + 90 * Math.abs(num(r.temporal_mean_gain_vs_base, 0)),
      }));
      const ctx = document.getElementById('frontier-chart');
      if (!ctx) return;
      destroy('frontier');
      charts.frontier = new Chart(ctx, {
        type: 'bubble',
        data: {
          datasets: [
            { label: 'Non Pareto', data: nonPareto, backgroundColor: '#94a3b866', borderColor: '#64748b88', borderWidth: 1 },
            { label: 'Pareto', data: pareto, backgroundColor: '#2dd4bfbb', borderColor: '#115e59', borderWidth: 1.2 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { title: { display: true, text: 'AUC' }, grid: { color: 'rgba(148,163,184,0.1)' } },
            y: { title: { display: true, text: '1 - Brier' }, grid: { color: 'rgba(148,163,184,0.1)' } },
          },
        },
      });
    }

    function drawRiskMix(snapshot) {
      const total = Math.max(0, num(snapshot.city_count, 0));
      const fragile = Math.max(0, num(snapshot.fragile_boom_count, 0));
      const highRisk = Math.max(0, num(snapshot.high_risk_non_fragile_count, 0));
      const stable = Math.max(0, num(snapshot.stable_low_risk_count, 0));
      const series = total > 0 ? [fragile, highRisk, stable] : [0, 0, 0];
      const ctx = document.getElementById('risk-mix-chart');
      if (!ctx) return;
      destroy('riskMix');
      charts.riskMix = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Fragile Boom', 'High Risk (non-fragile)', 'Stable / Low Risk'],
          datasets: [{
            data: series,
            backgroundColor: ['#dc2626cc', '#b45309cc', '#2dd4bfcc'],
            borderWidth: 0,
            hoverOffset: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '62%',
          plugins: { legend: { position: 'bottom' } },
        },
      });
    }

    function renderRiskCities(rows) {
      const body = document.getElementById('risk-city-body');
      if (!body) return;
      const data = (rows || []).slice(0, 15);
      body.innerHTML = data.map((r) => `
        <tr>
          <td>${r.city_name || '--'}</td>
          <td>${r.country || '--'}</td>
          <td class="${num(r.stall_risk_score, 0) >= 60 ? 'bad' : ''}">${fmt(r.stall_risk_score, 1)}</td>
          <td>${fmt(r.acceleration_score, 1)}</td>
          <td>${labelize(r.trajectory_regime)}</td>
        </tr>
      `).join('');
    }

    function renderSummary(bundle) {
      const top = bundle.top_tier_summary || {};
      const gate = top.top_tier_gate || {};
      const dashboard = bundle.dashboard_summary || {};
      const nowcast = bundle.pulse_nowcast_summary || {};
      const dynamics = bundle.pulse_dynamics_summary || {};
      const method = bundle.dynamic_method_core_summary || {};
      const methodMain = method.global_vs_ridge_ar2 || {};
      const snapshot = bundle.dynamic_snapshot || {};
      const rows = [
        ['Global panel rows', String(dashboard.records || '--')],
        ['Cities', String(dashboard.city_count || '--')],
        ['Scope city count', String(snapshot.city_count || '--')],
        ['Nowcast directional accuracy', fmt(nowcast.global_backtest_directional_accuracy, 3)],
        ['Nowcast coverage95', fmt(coverage95(nowcast), 3)],
        ['Warning AUC (H2)', fmt(dynamics.global_warning_auc_h2, 3)],
        ['Resilience score', fmt(dynamics.global_resilience_score_0_100, 2)],
        ['Method MAE gain', fmt(methodMain.mae_gain, 3)],
        ['Method ternary p-value', fmt(methodMain.ternary_accuracy_p_value, 3)],
        ['Fragile-boom share', `${fmt(100 * num(snapshot.fragile_boom_share, NaN), 1)}%`],
        ['High stall-risk share', `${fmt(100 * num(snapshot.high_stall_risk_share, NaN), 1)}%`],
        ['Gate pass rate', fmt(gate.gate_pass_rate, 3)],
        ['Evidence score', fmt(top.evidence_overall_score_0_100, 2)],
      ];
      const body = document.getElementById('summary-body');
      if (!body) return;
      body.innerHTML = rows.map((r) => `<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    }

    function renderActions(bundle) {
      const failed = (((bundle || {}).highlights || {}).failed_gates || []).slice();
      const weakest = (((bundle || {}).highlights || {}).weakest_evidence_track || {});
      const strongId = (((bundle || {}).highlights || {}).strongest_primary_identification || {});
      const bestFrontier = (((bundle || {}).highlights || {}).best_frontier_candidate || {});
      const snapshot = (bundle || {}).dynamic_snapshot || {};
      const items = [];
      failed.forEach((r, i) => {
        if (i >= 6) return;
        items.push(`[P1] дҝ®еӨҚ ${labelize(r.gate)}: value=${fmt(r.value, 4)}, threshold=${fmt(r.threshold, 4)}гҖӮ`);
      });
      if (weakest && Object.keys(weakest).length) {
        items.push(`[P2] жҸҗеҚҮиҜҒжҚ®иҪЁйҒ“ ${labelize(weakest.evidence_track)}пјҲscore=${fmt(weakest.score_0_100, 2)}пјүгҖӮ`);
      }
      if (strongId && Object.keys(strongId).length) {
        items.push(`[P2] е·©еӣәдё»иҪЁиҜҶеҲ« ${labelize(strongId.design_variant)}пјҲstrength=${fmt(strongId.identification_strength, 2)}пјүгҖӮ`);
      }
      if (bestFrontier && Object.keys(bestFrontier).length) {
        items.push(`[P3] дҝқз•ҷеүҚжІҝеҖҷйҖүпјҲAUC=${fmt(bestFrontier.eval_roc_auc, 3)}, Brier=${fmt(bestFrontier.eval_brier, 3)}пјүдҪңдёәдё»ж–ҮеҜ№з…§гҖӮ`);
      }
      if (num(snapshot.fragile_boom_share, 0) >= 0.25) {
        items.push(`[P1] еҪ“еүҚзӯӣйҖүдёӢи„Ҷејұз№ҒиҚЈеҚ жҜ” ${fmt(100 * num(snapshot.fragile_boom_share, 0), 1)}%пјҢе»әи®®иЎҘе……иҜҘдәҡзҫӨзҡ„жңәеҲ¶дёҺж”ҝзӯ–ејӮиҙЁжҖ§е®һйӘҢгҖӮ`);
      }
      if (!items.length) {
        items.push('[P3] еҪ“еүҚ gate е…ЁйҖҡиҝҮпјҢе»әи®®е°ҶзІҫеҠӣж”ҫеңЁеӨ–йғЁж•ҲеәҰжү©еұ•дёҺжңәеҲ¶йҷ„еҪ•гҖ?);
      }
      const ul = document.getElementById('action-list');
      if (!ul) return;
      ul.innerHTML = items.map((x) => `<li>${x}</li>`).join('');
    }

    function renderNarrative(bundle) {
      const top = bundle.top_tier_summary || {};
      const gate = top.top_tier_gate || {};
      const method = bundle.dynamic_method_core_summary || {};
      const methodMain = method.global_vs_ridge_ar2 || {};
      const nowcast = bundle.pulse_nowcast_summary || {};
      const snapshot = bundle.dynamic_snapshot || {};
      const strongest = (((bundle || {}).highlights || {}).strongest_primary_identification || {});
      const weak = (((bundle || {}).highlights || {}).weakest_evidence_track || {});
      const ready = gate.ready ? 'READY' : 'NOT READY';

      const callout = document.getElementById('story-callout');
      if (callout) {
        callout.innerHTML = `
          <strong>еҪ“еүҚеҸҷдәӢз»“и®әпј?/strong>
          еңЁеҠЁжҖҒиҜ„дј°й“ҫжқЎдёӯпјҢNowcast ж–№еҗ‘еҮҶзЎ®зҺҮдёә <strong>${fmt(nowcast.global_backtest_directional_accuracy, 3)}</strong>пј?          ж–№жі•еўһзӣҠпјҲMAEпјүдёә <strong>${fmt(methodMain.mae_gain, 3)}</strong>пј?          иҜҶеҲ«дё»иҪЁжңҖй«ҳејәеәҰдёә <strong>${fmt(strongest.identification_strength, 2)}</strong>пј?          Top-tier gate зҠ¶жҖҒдёә <strong>${ready}</strong>пјҲйҖҡиҝҮзҺ?${fmt(gate.gate_pass_rate, 3)}пјүпјҢ
          и„Ҷејұз№ҒиҚЈеҚ жҜ”дё?<strong>${fmt(100 * num(snapshot.fragile_boom_share, NaN), 1)}%</strong>гҖ?          дёӢдёҖжӯҘеә”дјҳе…ҲиЎҘејә <strong>${labelize(weak.evidence_track || '--')}</strong> иҪЁйҒ“иҜҒжҚ®е№¶дҝқжҢҒиҜҶеҲ«зЁіеҒҘжҖ§гҖ?        `;
      }

      const aiFlow = document.getElementById('flow-ai');
      if (aiFlow) {
        aiFlow.textContent = `Nowcast dir-acc=${fmt(nowcast.global_backtest_directional_accuracy, 3)}пјҢcoverage95=${fmt(coverage95(nowcast), 3)}пјҢmethod О”MAE=${fmt(methodMain.mae_gain, 3)}гҖӮ`;
      }
      const idFlow = document.getElementById('flow-id');
      if (idFlow) {
        idFlow.textContent = `жңҖејәдё»иҪ?${labelize(strongest.design_variant || '--')}пјҢиҜҶеҲ«ејәеә?${fmt(strongest.identification_strength, 2)}пјҢзЁіеҒҘйҖҡиҝҮзҺ?${fmt(100 * num(strongest.robust_pass_rate, 0), 1)}%гҖӮ`;
      }
      const decisionFlow = document.getElementById('flow-decision');
      if (decisionFlow) {
        decisionFlow.textContent = `Gate=${ready}пјҢйҖҡиҝҮзҺ?${fmt(gate.gate_pass_rate, 3)}пјҢи„Ҷејұз№ҒиҚЈеҚ жҜ?${fmt(100 * num(snapshot.fragile_boom_share, NaN), 1)}%пјҢEvidence score=${fmt(top.evidence_overall_score_0_100, 2)}гҖӮ`;
      }
    }

    function downloadBlob(content, filename, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function downloadHtmlSnapshot() {
      const stamp = new Date().toISOString().slice(0, 10).replaceAll('-', '');
      const html = '<!doctype html>\n' + document.documentElement.outerHTML;
      downloadBlob(html, `macro_city_engine_top_tier_story_${stamp}.html`, 'text/html;charset=utf-8');
    }

    function downloadStoryJson() {
      const stamp = new Date().toISOString().slice(0, 10).replaceAll('-', '');
      const pretty = JSON.stringify(currentBundle || {}, null, 2);
      downloadBlob(pretty, `macro_city_engine_top_tier_story_${stamp}.json`, 'application/json;charset=utf-8');
    }

    async function init() {
      const filters = (window.UPDashboardFilters && window.UPDashboardFilters.getState)
        ? window.UPDashboardFilters.getState()
        : { year: 'all', continent: 'all' };
      const qs = new URLSearchParams();
      if (filters.continent && filters.continent !== 'all') qs.set('continent', filters.continent);
      if (filters.year && filters.year !== 'all') qs.set('year', filters.year);
      const query = qs.toString();
      const bundleUrl = query ? `/api/top_tier_story_bundle?${query}` : '/api/top_tier_story_bundle';
      const markdownUrl = query ? `/api/top_tier_story_markdown?${query}` : '/api/top_tier_story_markdown';
      const bundle = await fetch(bundleUrl).then((r) => r.json()).catch(() => ({}));
      currentBundle = bundle || {};
      const top = bundle.top_tier_summary || {};
      const gate = top.top_tier_gate || {};
      const snapshot = bundle.dynamic_snapshot || {};
      const selectedFilters = bundle.selected_filters || {};
      const meta = document.getElementById('story-meta');
      if (meta) {
        const y = selectedFilters.year === null || selectedFilters.year === undefined ? 'latest' : String(selectedFilters.year);
        const c = selectedFilters.continent || 'all';
        meta.textContent = `еҝ«з…§ж—¶й—ҙпј?{bundle.generated_at_utc || '--'}пјӣзӯӣйҖүпјҡcontinent=${c}, year=${y}пјӣйқўжқҝи§„жЁЎпјҡ${(bundle.dashboard_summary || {}).city_count || '--'} еҹҺеёӮпјӣй»ҳи®Өз®ҖжҙҒжЁЎејҸгҖӮ`;
      }
      const mdLink = document.getElementById('story-md-link');
      if (mdLink) mdLink.setAttribute('href', markdownUrl);

      setText('k-ready', gate.ready ? 'READY' : 'NOT READY', gate.ready ? 'good' : 'bad');
      setText('k-evidence', fmt(top.evidence_overall_score_0_100, 2));
      setText('k-gate-pass', fmt(gate.gate_pass_rate, 3));
      setText('k-fragile', `${fmt(100 * num(snapshot.fragile_boom_share, NaN), 1)}%`);

      drawGate(bundle.gate_checks || []);
      drawEvidence(bundle.evidence_convergence || []);
      drawFrontier(bundle.innovation_frontier || []);
      drawRiskMix(snapshot);
      renderRiskCities(bundle.dynamic_top_risk_cities || []);
      renderSummary(bundle);
      renderActions(bundle);
      renderNarrative(bundle);
    }

    async function boot() {
      if (window.UPDashboardFilters && window.UPDashboardFilters.mount) {
        await window.UPDashboardFilters.mount({
          onChange: () => init(),
          hint: 'еҸҷдәӢйЎөй»ҳи®ӨдҪҝз”Ёе…ЁеұҖз»“жһңпјҢзӯӣйҖүзҠ¶жҖҒз”ЁдәҺдёҺе…¶д»–еӯҗз•ҢйқўиҒ”еҠЁгҖ?,
        });
      }
      await init();
    }

    boot();
  </script>
</body>
</html>
