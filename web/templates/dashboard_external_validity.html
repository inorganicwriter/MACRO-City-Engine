  <link rel="stylesheet" href="{{ url_for('static', filename='subpages.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">

      </div>
      <nav class="nav">
        <a href="/">й—ЁжҲ·</a>
        <a href="/dashboard/dynamics">еҠЁжҖҒйў„иӯ?/a>
        <a href="/dashboard/method-core">ж–№жі•жҳҫи‘—жҖ?/a>
        <a href="/dashboard/realtime">е®һж—¶зӣ‘жөӢ</a>
        <a href="/dashboard/identification">иҜҶеҲ«зӯ–з•Ҙ</a>
        <a class="active" href="/dashboard/external-validity">еӨ–йғЁж•ҲеәҰ</a>
        <a href="/dashboard/policy-rl">ж”ҝзӯ–RL</a>
        <a href="/dashboard/top-tier">Top-tier и§Ҷи§’</a>
        <a href="/dashboard/top-tier-story">иҜ„е®ЎеҸҷдәӢ</a>
        <a href="/dashboard/full">е…ЁйҮҸзңӢжқҝ</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <p class="eyebrow">External Validity</p>
      <h2>еҚ•йЎөе®ЎжҹҘ AI з»“и®әеңЁзӢ¬з«ӢжҢҮж ҮдёҠзҡ„еӨ–йғЁеҸҜиҝҒз§»жҖ?/h2>
      <p>еұ•зӨәеӨ–йғЁжҢҮж ҮдёҠзҡ„ FE ејәеәҰгҖҒз§©зӣёе…іиҪЁиҝ№гҖҒйў„жөӢеўһзӣҠпјҢеҪўжҲҗвҖңAI жҢҮж ҮеҲ°з»ҸжөҺеҗҺжһңвҖқзҡ„жЎҘжҺҘиҜҒжҚ®гҖ?/p>
    </section>

    <section class="grid-4">
      <div class="card"><p>иҜ„дј°жҢҮж Үж•?/p><h3 id="k-indicators">--</h3></div>
      <div class="card"><p>е№іеқҮ |t|</p><h3 id="k-abs-t">--</h3></div>
      <div class="card"><p>е№іеқҮз§©зӣёе…?/p><h3 id="k-rank">--</h3></div>
      <div class="card"><p>е№іеқҮйў„жөӢеўһзӣҠ</p><h3 id="k-uplift">--</h3></div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h3>жҢҮж Үеұ?FE ејәеәҰдёҺз§©зӣёе…і</h3>
        <div class="chart-wrap tall"><canvas id="indicator-chart"></canvas></div>
      </article>
      <article class="panel">
        <h3>з§©зӣёе…іж—¶еәҸпјҲTop3 жҢҮж Үпј?/h3>
        <div class="chart-wrap tall"><canvas id="rank-year-chart"></canvas></div>
      </article>
    </section>

    <section class="panel">
      <h3>еӨ–йғЁж•ҲеәҰжҳҺз»ҶиЎ?/h3>
      <table>
        <thead>
          <tr>
            <th>Indicator</th>
            <th>TWFE t</th>
            <th>Spearman</th>
            <th>R2 Uplift</th>
            <th>N</th>
          </tr>
        </thead>
        <tbody id="indicator-body"></tbody>
      </table>
    </section>
  </main>

  <script src="{{ url_for('static', filename='dashboard_filters.js') }}"></script>
  <script>
    let cIndicator;
    let cRank;

    function fmt(v, d = 2) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return '--';
      return Number(v).toFixed(d);
    }
    function set(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }
    function parseUplift(obj) {
      if (obj === null || obj === undefined) return NaN;
      const s = String(obj);
      const m = s.match(/r2_uplift['"]?\s*:\s*([-+0-9.eE]+)/);
      if (!m) return NaN;
      const v = Number(m[1]);
      return Number.isFinite(v) ? v : NaN;
    }

    function drawIndicator(rows) {
      const data = (rows || []).slice().sort((a, b) => Math.abs(Number(b.twfe_t_value_composite || 0)) - Math.abs(Number(a.twfe_t_value_composite || 0)));
      const labels = data.map((r) => String(r.indicator || '').replaceAll('_', ' '));
      const tval = data.map((r) => Number(r.twfe_t_value_composite || 0));
      const rank = data.map((r) => Number(r.mean_spearman_rank_corr || 0));
      const ctx = document.getElementById('indicator-chart');
      if (!ctx) return;
      if (cIndicator) cIndicator.destroy();
      cIndicator = new Chart(ctx, {
        data: {
          labels,
          datasets: [
            { type: 'bar', label: 'TWFE t-value', data: tval, backgroundColor: '#2dd4bfbb', borderRadius: 6, yAxisID: 'y' },
            { type: 'line', label: 'Mean Spearman', data: rank, borderColor: '#60a5fa', tension: 0.2, yAxisID: 'y1' },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { position: 'left', grid: { color: 'rgba(148,163,184,0.1)' } },
            y1: { position: 'right', min: -1, max: 1, grid: { display: false } },
          },
        },
      });
    }

    function drawRankYear(rows, indicators, selectedYear) {
      const yearSet = new Set();
      let filtered = (rows || []).filter((r) => indicators.includes(String(r.indicator || '')));
      if (selectedYear && selectedYear !== 'all') {
        filtered = filtered.filter((r) => Number(r.year || 0) <= Number(selectedYear));
      }
      filtered.forEach((r) => yearSet.add(Number(r.year)));
      const years = Array.from(yearSet).filter((x) => Number.isFinite(x)).sort((a, b) => a - b);
      const palette = ['#2dd4bf', '#60a5fa', '#fbbf24'];
      const datasets = indicators.map((ind, i) => {
        const m = new Map(
          filtered.filter((r) => String(r.indicator || '') === ind).map((r) => [Number(r.year), Number(r.spearman_rank_corr || 0)])
        );
        return {
          label: ind.replaceAll('_', ' '),
          data: years.map((y) => m.has(y) ? m.get(y) : null),
          borderColor: palette[i % palette.length],
          tension: 0.2,
          spanGaps: true,
        };
      });
      const ctx = document.getElementById('rank-year-chart');
      if (!ctx) return;
      if (cRank) cRank.destroy();
      cRank = new Chart(ctx, {
        type: 'line',
        data: { labels: years.map(String), datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: { y: { min: -1, max: 1, grid: { color: 'rgba(148,163,184,0.1)' } }, x: { grid: { display: false } } },
        },
      });
    }

    function renderTable(rows) {
      const body = document.getElementById('indicator-body');
      if (!body) return;
      const data = (rows || []).slice().sort((a, b) => Number(b.mean_spearman_rank_corr || 0) - Number(a.mean_spearman_rank_corr || 0));
      body.innerHTML = data.map((r) => `
        <tr>
          <td>${String(r.indicator || '--')}</td>
          <td>${fmt(r.twfe_t_value_composite, 2)}</td>
          <td>${fmt(r.mean_spearman_rank_corr, 3)}</td>
          <td>${fmt(parseUplift(r.predictive_uplift), 3)}</td>
          <td>${fmt(r.n_obs, 0)}</td>
        </tr>
      `).join('');
    }

    async function init() {
      const filters = (window.UPDashboardFilters && window.UPDashboardFilters.getState)
        ? window.UPDashboardFilters.getState()
        : { year: 'all', continent: 'all' };
      const selectedYear = filters.year;
      const [summary, indicators, rankYear] = await Promise.all([
        fetch('/api/external_validity').then((r) => r.json()).catch(() => ({})),
        fetch('/api/external_validity_indicators').then((r) => r.json()).catch(() => ([])),
        fetch('/api/external_validity_rank_corr').then((r) => r.json()).catch(() => ([])),
      ]);

      const indicatorCount = indicators.length;
      const rankRows = (selectedYear && selectedYear !== 'all')
        ? (rankYear || []).filter((r) => Number(r.year || 0) === Number(selectedYear))
        : (rankYear || []);
      const rankMean = rankRows.length
        ? rankRows.reduce((s, r) => s + Number(r.spearman_rank_corr || 0), 0) / rankRows.length
        : (indicatorCount ? indicators.reduce((s, r) => s + Number(r.mean_spearman_rank_corr || 0), 0) / indicatorCount : NaN);
      const upliftMean = indicatorCount ? indicators.reduce((s, r) => s + Number(parseUplift(r.predictive_uplift) || 0), 0) / indicatorCount : NaN;
      set('k-indicators', String(summary.indicators_evaluated || indicatorCount || '--'));
      set('k-abs-t', fmt(summary.avg_twfe_abs_t, 2));
      set('k-rank', fmt(rankMean, 3));
      set('k-uplift', fmt(upliftMean, 3));

      drawIndicator(indicators);
      const top3 = (indicators || [])
        .slice()
        .sort((a, b) => Number(b.mean_spearman_rank_corr || 0) - Number(a.mean_spearman_rank_corr || 0))
        .slice(0, 3)
        .map((r) => String(r.indicator || ''));
      drawRankYear(rankYear, top3, selectedYear);
      renderTable(indicators);
    }

    async function boot() {
      if (window.UPDashboardFilters && window.UPDashboardFilters.mount) {
        await window.UPDashboardFilters.mount({
          onChange: () => init(),
          hint: 'жң¬йЎөдё»иҰҒдҪҝз”ЁвҖңе№ҙд»ҪвҖқзӯӣйҖүпјҡеҸҜжҢүжҲӘжӯўе№ҙд»ҪжҹҘзңӢз§©зӣёе…іж—¶еәҸгҖ?,
        });
      }
      await init();
    }

    boot();
  </script>
</body>
</html>
